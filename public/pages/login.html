<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — DescarteCorreto</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .login-wrapper {
      min-height: calc(100vh - 56px - 52px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: var(--green-light);
    }
    .login-box {
      background: var(--white);
      border-radius: var(--radius);
      padding: 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow);
    }
    .login-box h1 {
      font-size: 1.4rem;
      margin-bottom: 1.5rem;
      color: var(--green);
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="/" class="navbar-brand">DescarteCorreto ♻️</a>
  <ul class="navbar-links">
    <li><a href="/pages/pontos.html">Pontos de Coleta</a></li>
    <li><a href="/pages/contribua.html">Contribuir</a></li>
    <li><a href="/pages/ranking.html">Ranking</a></li>
    <li id="nav-auth"></li>
  </ul>
</nav>

<div class="login-wrapper">
  <div class="login-box">
    <h1>DescarteCorreto ♻️</h1>

    <div class="tabs">
      <button class="tab-btn active" data-tab="tab-login">Entrar</button>
      <button class="tab-btn" data-tab="tab-register">Cadastrar</button>
    </div>

    <!-- Aba Login -->
    <div id="tab-login" class="tab-panel active">
      <div id="login-msg" class="msg"></div>
      <form id="form-login">
        <div class="form-group">
          <label for="login-email">E-mail</label>
          <input type="email" id="login-email" required placeholder="seu@email.com">
        </div>
        <div class="form-group">
          <label for="login-password">Senha</label>
          <input type="password" id="login-password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Entrar</button>
      </form>
    </div>

    <!-- Aba Cadastro -->
    <div id="tab-register" class="tab-panel">
      <div id="reg-msg" class="msg"></div>
      <form id="form-register">
        <div class="form-group">
          <label for="reg-name">Nome</label>
          <input type="text" id="reg-name" required placeholder="Seu nome">
        </div>
        <div class="form-group">
          <label for="reg-email">E-mail</label>
          <input type="email" id="reg-email" required placeholder="seu@email.com">
        </div>
        <div class="form-group">
          <label for="reg-password">Senha</label>
          <input type="password" id="reg-password" required placeholder="Mínimo 6 caracteres">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Criar conta</button>
      </form>
    </div>
  </div>
</div>

<footer>
  <p>DescarteCorreto © 2026 — Projeto Acadêmico Univille</p>
</footer>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/login.js"></script>
</body>
</html>
