<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ranking — DescarteCorreto</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    table { width: 100%; border-collapse: collapse; background: var(--white); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
    thead { background: var(--green); color: var(--white); }
    thead th { padding: 0.75rem 1rem; text-align: left; font-size: 0.9rem; }
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:last-child { border-bottom: none; }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="/" class="navbar-brand">DescarteCorreto ♻️</a>
  <ul class="navbar-links">
    <li><a href="/pages/pontos.html">Pontos de Coleta</a></li>
    <li><a href="/pages/contribua.html">Contribuir</a></li>
    <li><a href="/pages/ranking.html" class="active">Ranking</a></li>
    <li id="nav-auth"></li>
  </ul>
</nav>

<section class="section">
  <div class="container">
    <h2 class="section-title">🏆 Ranking de Contribuições</h2>
    <p style="color:var(--text-secondary);margin-bottom:1.5rem;font-size:0.9rem">
      Usuários com mais denúncias e coletas concluídas.
    </p>
    <table>
      <thead>
        <tr>
          <th style="text-align:center;width:60px">#</th>
          <th>Nome</th>
          <th style="text-align:center">Denúncias</th>
          <th style="text-align:center">Coletas</th>
          <th style="text-align:center">Total</th>
        </tr>
      </thead>
      <tbody id="ranking-body">
        <tr><td colspan="5" class="empty-state">Carregando...</td></tr>
      </tbody>
    </table>
    <div id="paginacao" style="display:flex;align-items:center;justify-content:center;gap:1rem;margin-top:1.5rem"></div>
  </div>
</section>

<footer>
  <p>DescarteCorreto © 2026 — Projeto Acadêmico Univille</p>
</footer>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/ranking.js"></script>
</body>
</html>
