<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pontos de Coleta — DescarteCorreto</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar">
  <a href="/" class="navbar-brand">DescarteCorreto ♻️</a>
  <button class="navbar-toggle" onclick="toggleNavMenu()" aria-label="Menu">☰</button>
  <ul class="navbar-links">
    <li><a href="/pages/pontos.html" class="active">Pontos de Coleta</a></li>
    <li><a href="/pages/contribua.html">Contribuir</a></li>
    <li><a href="/pages/ranking.html">Ranking</a></li>
    <li id="nav-auth"></li>
  </ul>
</nav>

<section class="section">
  <div class="container">
    <h2 class="section-title">Pontos de Coleta</h2>

    <!-- Filtros -->
    <div class="card" style="margin-bottom:1.5rem;display:flex;gap:1rem;flex-wrap:wrap;align-items:flex-end">
      <div class="form-group" style="margin:0;flex:1;min-width:180px">
        <label for="filtro-tipo">Filtrar por tipo</label>
        <select id="filtro-tipo">
          <option value="">Todos os tipos</option>
          <option value="recyclable">Reciclável</option>
          <option value="electronic">Eletrônico</option>
          <option value="oil">Óleo</option>
          <option value="battery">Bateria</option>
          <option value="organic">Orgânico</option>
          <option value="medication">Medicamento</option>
        </select>
      </div>
      <div class="form-group" style="margin:0;flex:1;min-width:180px">
        <label for="filtro-bairro">Filtrar por bairro</label>
        <input type="text" id="filtro-bairro" placeholder="Ex: Centro">
      </div>
      <button id="btn-filtrar" class="btn btn-outline" style="margin-bottom:0">Buscar</button>
    </div>
    <div id="lista-pontos">
      <p class="empty-state">Carregando...</p>
    </div>
  </div>
</section>

<footer>
  <p>DescarteCorreto © 2026 — Projeto Acadêmico Univille</p>
</footer>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/pontos.js"></script>
</body>
</html>
