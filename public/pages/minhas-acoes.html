<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minhas Ações — DescarteCorreto</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .acoes-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }
    .acoes-grid h3 {
      font-size: 1.1rem;
      color: var(--green);
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--green-light);
    }
    @media (max-width: 700px) {
      .acoes-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="/" class="navbar-brand">DescarteCorreto ♻️</a>
  <button class="navbar-toggle" onclick="toggleNavMenu()" aria-label="Menu">☰</button>
  <ul class="navbar-links">
    <li><a href="/pages/pontos.html">Pontos de Coleta</a></li>
    <li><a href="/pages/contribua.html">Contribuir</a></li>
    <li><a href="/pages/ranking.html">Ranking</a></li>
    <li id="nav-auth"></li>
  </ul>
</nav>

<section class="section">
  <div class="container">
    <h2 class="section-title">Minhas Ações</h2>

    <div class="acoes-grid">
      <div>
        <h3>🚨 Minhas Denúncias</h3>
        <div id="lista-denuncias">
          <p class="empty-state">Carregando...</p>
        </div>
        <div id="paginacao-denuncias" style="display:flex;align-items:center;justify-content:center;gap:1rem;margin-top:1rem"></div>
      </div>
      <div>
        <h3>♻️ Minhas Coletas</h3>
        <div id="lista-coletas">
          <p class="empty-state">Carregando...</p>
        </div>
        <div id="paginacao-coletas" style="display:flex;align-items:center;justify-content:center;gap:1rem;margin-top:1rem"></div>
      </div>
    </div>
  </div>
</section>

<footer>
  <p>DescarteCorreto © 2026 — Projeto Acadêmico Univille</p>
</footer>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/minhas-acoes.js"></script>
</body>
</html>
